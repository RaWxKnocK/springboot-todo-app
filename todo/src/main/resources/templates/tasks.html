<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo Application</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .todo-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        h1 {
            font-weight: 600;
            color: #444;
        }

        .form-control {
            border-radius: 12px;
        }

        .btn-primary {
            border-radius: 12px;
            background: #667eea;
            border: none;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: #5563c1;
            transform: scale(1.05);
        }

        .card {
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .btn-outline-secondary,
        .btn-outline-danger {
            border-radius: 8px;
        }

        .text-strikethrough {
            text-decoration: line-through;
            color: grey;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<div class="todo-container">
    <h1 class="text-center mb-4">✨ Todo Application</h1>

    <!-- Add Task Form -->
    <form action="/" method="post" class="row g-2">
        <div class="col-md-9">
            <input class="form-control form-control-lg"
                   type="text"
                   name="title"
                   placeholder="What do you need to do today?"
                   required>
        </div>
        <div class="col-md-3 d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Add Task</button>
        </div>
    </form>

    <!-- Task List -->
    <div class="mt-4">
        <th:block th:each="task : ${tasks}">
            <div class="card mb-3">
                <div class="card-body d-flex justify-content-between align-items-center">

                    <span th:classappend="${task.completed} ? 'text-strikethrough'"
                          th:text="${task.title}"
                          class="fw-medium">
                        Task Title
                    </span>

                    <div class="d-flex gap-2">
                        <a th:href="@{/{id}/toggle(id=${task.id})}"
                           class="btn btn-outline-secondary btn-sm">
                            ✔
                        </a>

                        <a th:href="@{/{id}/delete(id=${task.id})}"
                           class="btn btn-outline-danger btn-sm">
                            ✖
                        </a>
                    </div>

                </div>
            </div>
        </th:block>
    </div>
</div>

</body>
</html>
